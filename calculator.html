<!DOCTYPE html>
<html>
<head>
    <title>Django Calculator</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; margin-top: 100px; }
        .calculator { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px gray; width: 300px; }
        input, select, button { width: 100%; margin: 10px 0; padding: 10px; font-size: 16px; }
        button { background: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
<div class="calculator">
    <h2>Calculator</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="number" step="any" name="num1" placeholder="First number" required>
        <input type="number" step="any" name="num2" placeholder="Second number" required>
        <select name="operation">
            <option value="+">Addition (+)</option>
            <option value="-">Subtraction (-)</option>
            <option value="*">Multiplication (*)</option>
            <option value="/">Division (/)</option>
            <option value="^">Power (^)</option>
            <option value="%">Percentage (num1% of num2)</option>
        </select>
        <button type="submit">Calculate</button>
    </form>

    {% if result is not None %}
        <div class="result">Result: {{ result }}</div>
    {% endif %}
</div>
</body>
</html>
